name: BreezeCore
version: '${version}'
main: ru.breezeproject.core.BreezeCorePlugin
api-version: '1.21'
author: BreezeProject
description: Core loader and service registry for BreezeCore modules.

commands:
  breezemodules:
    description: Lists loaded modules, or reloads a single one.
    usage: /breezemodules [reload <name>]
    aliases: [bmodules, bcmodules]
    permission: breeze.modules.list

permissions:
  breeze.modules.list:
    description: Allows listing currently loaded BreezeCore modules.
    default: op
  breeze.modules.reload:
    description: Allows reloading a single BreezeCore module from disk.
    default: op
  breeze.admin.*:
    description: Grants all BreezeCore admin permissions.
    default: op
    children:
      breeze.modules.list: true
      breeze.modules.reload: true
