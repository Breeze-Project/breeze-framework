name: BreezeCore
version: '${version}'
main: ru.breezeproject.core.BreezeCorePlugin
api-version: '1.21'
author: BreezeProject
description: Core loader and service registry for BreezeCore modules.

commands:
  breezemodules:
    description: Manage BreezeCore modules.
    usage: /breezemodules [load|reload|enable|disable] [name]
    aliases: [bmodules, bcmodules]
    permission: breeze.modules.list

permissions:
  breeze.modules.list:
    description: Allows listing BreezeCore modules.
    default: op
  breeze.modules.reload:
    description: Allows reloading a loaded module from disk.
    default: op
  breeze.modules.load:
    description: Allows loading new modules from disk without restarting the server.
    default: op
  breeze.modules.enable:
    description: Allows enabling a disabled module.
    default: op
  breeze.modules.disable:
    description: Allows disabling a loaded module.
    default: op
  breeze.admin.*:
    description: Grants all BreezeCore admin permissions.
    default: op
    children:
      breeze.modules.list: true
      breeze.modules.reload: true
      breeze.modules.load: true
      breeze.modules.enable: true
      breeze.modules.disable: true
